# Tiny Tapeout project information
project:
  title:        "Sequential 2x2 Matrix Inversion Solver"
  author:       "Azam Mohamed"
  discord:      "an7ut"
  description:  "Sequential Q4.4 matrix solver (Ax=b) using a shared 13-bit accumulator."
  language:     "Verilog"
  clock_hz:     50000000       # 50 MHz

  # How many tiles your design occupies? 
  tiles: "1x1"

  # Your top module name must start with "tt_um_".
  top_module:  "tt_um_solve2x2"

  # List your project's source files here.
  source_files:
    - "project.v"

# The pinout of your project. 
pinout:
  # Inputs — ui_in[3:0] used for 4-bit signed data stream
  ui[0]: "DATA[0] - input stream bit 0"
  ui[1]: "DATA[1] - input stream bit 1"
  ui[2]: "DATA[2] - input stream bit 2"
  ui[3]: "DATA[3] - input stream bit 3"
  ui[4]: "unused"
  ui[5]: "unused"
  ui[6]: "unused"
  ui[7]: "unused"

  # Outputs — uo_out[7:0]: Full 8-bit Q4.4 result (x0 or x1 based on sel)
  uo[0]: "RESULT[0] - Q4.4 bit 0"
  uo[1]: "RESULT[1] - Q4.4 bit 1"
  uo[2]: "RESULT[2] - Q4.4 bit 2"
  uo[3]: "RESULT[3] - Q4.4 bit 3"
  uo[4]: "RESULT[4] - Q4.4 bit 4"
  uo[5]: "RESULT[5] - Q4.4 bit 5"
  uo[6]: "RESULT[6] - Q4.4 bit 6"
  uo[7]: "RESULT[7] - Q4.4 bit 7"

  # Bidirectional pins
  # uio_in  → control inputs
  # uio_out → status outputs (uio_oe[2:0]=1)
  uio[0]: "start (in) / valid (out) - pulse high to load; high when ready"
  uio[1]: "sel (in) / singular (out) - 0:x0, 1:x1; high if det==0"
  uio[2]: "unused (in) / overflow (out) - high if result saturated"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6
