# Tiny Tapeout project information
project:
  title:        "2x2 Matrix Inversion Solver"      # Project title
  author:       "Azam Mohamed"      # Your name
  discord:      "an7ut"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Solves Ax=b for a 2x2 matrix using fixed-point arithmetic (Q16.16)."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_solve2x2_q16"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs — ui_in[7:0]: data byte streamed in (LSB-first, 12 bytes total)
  # Byte order: a_lo, a_hi, b_lo, b_hi, c_lo, c_hi, d_lo, d_hi, e_lo, e_hi, f_lo, f_hi
  ui[0]: "DATA[0] - input byte bit 0"
  ui[1]: "DATA[1] - input byte bit 1"
  ui[2]: "DATA[2] - input byte bit 2"
  ui[3]: "DATA[3] - input byte bit 3"
  ui[4]: "DATA[4] - input byte bit 4"
  ui[5]: "DATA[5] - input byte bit 5"
  ui[6]: "DATA[6] - input byte bit 6"
  ui[7]: "DATA[7] - input byte bit 7"

  # Outputs — uo_out[7:0]: selected byte of Q16.16 result (x0 or x1)
  uo[0]: "RESULT[0] - result byte bit 0"
  uo[1]: "RESULT[1] - result byte bit 1"
  uo[2]: "RESULT[2] - result byte bit 2"
  uo[3]: "RESULT[3] - result byte bit 3"
  uo[4]: "RESULT[4] - result byte bit 4"
  uo[5]: "RESULT[5] - result byte bit 5"
  uo[6]: "RESULT[6] - result byte bit 6"
  uo[7]: "RESULT[7] - result byte bit 7"

  # Bidirectional pins
  # uio_in  → control inputs (driven by host)
  # uio_out → status outputs (driven by this module, uio_oe[2:0]=1)
  uio[0]: "start (in) / valid (out) - pulse to begin loading; stays high when result ready"
  uio[1]: "sel (in) / singular (out) - 0=output x0, 1=output x1; high if det==0"
  uio[2]: "byte_sel[0] (in) / overflow (out) - selects byte of result; high if result saturated"
  uio[3]: "byte_sel[1] (in) - selects byte of 32-bit result (with uio[2])"
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""


# Do not change!
yaml_version: 6
